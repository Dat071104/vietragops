name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    env:
      GROQ_MODEL: llama-3.3-70b-versatile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile sources
        run: python -m compileall app rag evals frontend scripts tests

      - name: Run tests
        run: pytest -q

      - name: Validate chunk artifacts
        run: python scripts/validate_chunks.py --chunks-dir data/chunks

      - name: Retrieval smoke eval
        run: python -m evals.experiments.run_retrieval_eval --chunks data/chunks/chunks_500.jsonl --qa evals/datasets/dev_qa.jsonl --retriever hybrid --top_k 5

      - name: Docker Compose config
        run: docker compose config
